<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Assessment Records | WordHarbor</title>
    <link rel="icon" type="image/jpeg" href="harbor.jpg">
    <link rel="apple-touch-icon" href="harbor.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <header class="header-banner">
            <div class="header-content">
                <img src="harbor.jpg" alt="WordHarbor Logo" class="site-logo">
                <h1>WordHarbor</h1>
            </div>
            <p style="text-align:center; margin-top:5px;">Previous Assessment Records</p>
        </header>

        <div class="content-body">
            <section class="history-area" style="margin-top:0;">
                <h3>PREVIOUS ASSESSMENT RECORDS</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date/Time</th>
                                <th>Student Name</th>
                                <th>Level</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
                <div class="quick-links-actions" style="margin-top:18px;">
                    <button class="btn-start" type="button" onclick="window.location.href='index.html'">Back To Exam</button>
                    <button class="btn-start" type="button" onclick="window.location.href='comprehension.html'">View Comprehension Score</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <!-- Firebase Auth and Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

</body>
</html>
