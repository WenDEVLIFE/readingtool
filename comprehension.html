<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehension Score | WordHarbor</title>
    <link rel="icon" type="image/jpeg" href="harbor.jpg">
    <link rel="apple-touch-icon" href="harbor.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <header class="header-banner">
            <div class="header-content">
                <img src="harbor.jpg" alt="WordHarbor Logo" class="site-logo">
                <h1>WordHarbor</h1>
            </div>
            <p style="text-align:center; margin-top:5px;">Comprehension Score View</p>
        </header>

        <div class="content-body">
            <section class="results-dashboard" id="resultsDash" style="display: block;">
                <div class="dashboard-header">Comprehension Score</div>
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-label">Latest Level</span>
                        <div id="scoreLevelValue" class="stat-number" style="font-size:2rem;">-</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Final Score</span>
                        <div id="scoreValue" class="stat-number">0/0</div>
                    </div>
                </div>
                <div class="quick-links-actions" style="margin-top:18px; justify-content:center;">
                    <button class="btn-start" type="button" onclick="window.location.href='index.html'">Back To Exam</button>
                    <button class="btn-save-record btn-start" type="button" onclick="saveScore()">SAVE RECORD TO HISTORY</button>
                    <button class="btn-start" type="button" onclick="window.location.href='history.html'">View Previous Assessment Record</button>
                </div>
            </section>
        </div>
    </div>

    <div id="appAlert" class="app-alert" aria-hidden="true">
        <div class="app-alert-backdrop" onclick="closeAppAlert()"></div>
        <div class="app-alert-dialog" role="dialog" aria-modal="true" aria-labelledby="appAlertTitle">
            <h3 id="appAlertTitle">Notice</h3>
            <p id="appAlertMessage"></p>
            <button class="btn-start" type="button" onclick="closeAppAlert()">OK</button>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <!-- Firebase Auth and Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = window.FIREBASE_CONFIG || {
            apiKey: "AIzaSyB0l6qT-z56eQUMQgW6CbNbYwB1ZJmMzOk",
            authDomain: "readingtool-b2124.firebaseapp.com",
            projectId: "readingtool-b2124",
            storageBucket: "readingtool-b2124.firebasestorage.app",
            messagingSenderId: "981193866014",
            appId: "1:981193866014:web:7460f57861256cceb4270f",
            measurementId: "G-X7Y8622DZJ"
        };
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
